apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: fintech-staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
